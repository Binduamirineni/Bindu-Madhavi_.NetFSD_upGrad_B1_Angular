<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Notes Saver</title>
     <style>
        body {
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <h2>Personal Notes Saver</h2>
        <textarea id="t1" placeholder="Write your notes here..."></textarea><br>
        <button onclick="saveNotes()">Save</button>
        <button onclick="clearNotes()">Clear</button>
    </div>
    
    <script>

        window.onload = function ()
        {
            let saveNote = localStorage.getItem("notes");
            
            if(saveNote)
            {
                document.getElementById("t1").value = saveNote;
            }
        };

        function saveNotes() {
            let notes = document.getElementById("t1").value;
            localStorage.setItem("notes", notes);
            alert("Notes saved successfully!");
        }

        function clearNotes() {
            localStorage.removeItem("notes");
            document.getElementById("t1").value = "";
            alert("Notes cleared!");
        }
    </script>
</body>
</html>
