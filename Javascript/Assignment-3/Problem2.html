<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Form Validation</title>
</head>

<body>

<form>
    <fieldset style="width:300px;">
        <legend>Registration</legend>

        <table>
            <tr>
                <td>
                    <label>Name</label><br>
                    <input type="text" id="name" placeholder="Enter your name" onkeyup="validateName()" required>
                    <br>
                    <span id="nameMsg"></span>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Email</label><br>
                    <input type="email" id="email" placeholder="Enter your email" onkeyup="validateEmail()" required>
                    <br>
                    <span id="emailMsg"></span>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Age</label><br>
                    <input type="number" id="age" min="18" placeholder="Enter your Age" onkeyup="validateAge()" required>
                    <br>
                    <span id="ageMsg"></span>
                </td>
            </tr>

            <tr>
                <td>
                    <button type="button" onclick="saveData()">Submit</button>
                </td>
            </tr>
        </table>

    </fieldset>
</form>

<script>

function validateName() {
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("nameMsg");

    if (name === "") {
        msg.innerText = "Name cannot be empty";
        msg.style.color = "red";
        return false;
    } else {
        msg.innerText = "Valid name";
        msg.style.color = "green";
        return true;
    }
}

function validateEmail() {
    let email = document.getElementById("email").value.trim();
    let msg = document.getElementById("emailMsg");

    if (!email.includes("@") || !email.includes(".")) {
        msg.innerText = "Invalid email";
        msg.style.color = "red";
        return false;
    } else {
        msg.innerText = "Valid email";
        msg.style.color = "green";
        return true;
    }
}

function validateAge() {
    let age = document.getElementById("age").value;
    let msg = document.getElementById("ageMsg");

    if (age === "" || age < 18) {
        msg.innerText = "Age must be 18 or above";
        msg.style.color = "red";
        return false;
    } else {
        msg.innerText = "Valid age";
        msg.style.color = "green";
        return true;
    }
}

function saveData() {
    let isNameValid = validateName();
    let isEmailValid = validateEmail();
    let isAgeValid = validateAge();

    if (isNameValid && isEmailValid && isAgeValid) {

        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let age = document.getElementById("age").value;

        sessionStorage.setItem("name", name);
        sessionStorage.setItem("email", email);
        sessionStorage.setItem("age", age);

        alert("Data stored successfully in sessionStorage!");
    } 
    else {
        alert("Please fix validation errors!");
    }
}

</script>

</body>
</html>
