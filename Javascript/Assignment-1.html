<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body
        {
            background-color: antiquewhite;
            margin: 0;
        }
        nav {
            background-color: aqua;
            padding: 10px;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-around;
        }
        nav ul li {
            color: black;
            font-size: 18px;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            font-size: 36px;
        }
        p {
            text-align: center;
            font-size: 20px;
        }


        @media (max-width: 800px)
        {
            body
            {
                background-color: blueviolet;
            }
             h1 
            {
                font-size: 24px;
            }

            p 
            {
                font-size: 16px;
            }

            nav ul 
            {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Contact</li>
            </ul>
        </nav>
         <h1>Responsive Web Design</h1>
        <p>Resize the browser to see changes</p>

</body>
</html>
