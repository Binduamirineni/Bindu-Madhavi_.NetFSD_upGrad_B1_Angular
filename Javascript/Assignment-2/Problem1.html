<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="" id="uname">
    <button id="btn" onclick="display()">Generate Greeting</button>
    <p id="para"></p>

    <script>
        
        function display()
        {
            let name = document.getElementById("uname").value;
            document.getElementById("para").innerHTML = "Hello, "+name+ "! Welcome to our website."
        }

    </script>
</body>
</html>
