<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App </title>
    <style>
        .btn
        {
            text-align: center;
            padding-top: 300px;
            /* display: flex; */
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="btn">
        <p id="count">0</p>
        <button id="increment" onclick="increment()">Increment</button>
        <button id="reset" onclick="reset()" type="reset">Reset</button>

        <script>
            let Counter = 0;
            function increment()
            {
                Counter = Counter + 1;
                document.getElementById("count").innerHTML = Counter;
            }

            function reset()
            {
                Counter = 0;
                document.getElementById("count").innerHTML = Counter;    
            }


            
        </script>
    </div>
</body>
</html>
