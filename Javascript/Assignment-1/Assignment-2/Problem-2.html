<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="displayUserInfo(obj)">Click</button>
    <p id="name"></p>
    <p id="age"></p>
    <p id="city"></p>

    <script>
        let obj = 
        {
            Name: "Bindu",
            Age: 22,
            city : "Bangalore"
        };

        function displayUserInfo(obj) {
            document.getElementById("name").innerText = "Name: " + obj.Name;
            document.getElementById("age").innerText = "Age: " + obj.Age;
            document.getElementById("city").innerText = "City: " + obj.city;
        }
        
    </script>
</body>
</html>
