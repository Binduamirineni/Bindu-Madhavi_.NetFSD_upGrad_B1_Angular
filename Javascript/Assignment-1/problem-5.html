<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analysis Tool </title>
</head>
<body>
    <script>
        let num = 10;

        let res = (num > 0) ? "Positive" : "Negative";
        console.log(res);
        

        if(num % 2 ==0)
        {
            console.log("Even");            
        } else
        {
            console.log("Odd");  
        }


        for(let i=1;i<=num;i++)
        {
            console.log(i+" ");    
        }
    </script>
</body>
</html>
