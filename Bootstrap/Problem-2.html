<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eletronics Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-5">Eletronics Store</h2>

        <div class="row g-4">
            <div class="col-12 col-md-6 col-sm-3">
                <div class="card h-100 shadow-sm">
                    <img src="https://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/13-laptop-platinum-right-render-fy25:VP4-1260x795?fmt=png-alpha" alt="Laptop" class="card-img-top">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Laptop</h5>
                        <p class="card-text">High performance laptop</p>
                        <p class="fw-bold">₹60,000</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                            <button class="btn btn-ouline-secondary w-100">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-sm-3">
                <div class="card h-100 shadow-sm">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTndMcJW71HLgi9ntgoterJiJJjLxbtOVVpyA&s" height="300" alt="Headphones" class="card-img-top">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Headphones</h5>
                        <p class="card-text">Noise cancelling headphones.</p>
                        <p class="fw-bold">₹2,000</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                            <button class="btn btn-ouline-secondary w-100">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-sm-3">
                <div class="card h-100 shadow-sm">
                    <img src="https://media.istockphoto.com/id/1458492520/photo/black-wireless-computer-mouse-isolated-on-white-background.jpg?s=612x612&w=0&k=20&c=hLFS1ukv567H6S-7NjQzvVxNKb7qPkvIKbXkT7Sd2r8=" alt="Mouse" class="card-img-top">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Wireless Mouse</h5>
                        <p class="card-text">Ergonomic design mouse.</p>
                        <p class="fw-bold">₹800</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                            <button class="btn btn-outline-secondary w-100">View Details</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-sm-3">
                <div class="cart h-100 shadow-sm">
                    <img src="https://img.freepik.com/premium-psd/smartphone-mockup_8121-67.jpg?semt=ais_user_personalization&w=740&q=80" alt="Smartphone" class="card-img-top">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Smartphone</h5>
                        <p class="card-text">Latest 5G smartphone</p>
                        <p class="fw-bold">₹25,000</p>
                        <div class="mt-auto">
                            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                            <button class="btn btn-outline-secondary w-100">View Details</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
